<!DOCTYPE html>
<html>
<head>
    <title>My Product Page</title>

    <style>

        body {
            font-family: Arial;
            background: #e6f2ff;
            text-align: center;
            margin: 0;
        }

        header {
            background: #004080;
            color: white;
            padding: 15px;
        }

        .container {
            margin: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        footer {
            background: #004080;
            color: white;
            padding: 10px;
            margin-top: 40px;
        }

    </style>

    <script>
        function buyNow() {
            alert("Thank you! Purchase successful - JOEL");
        }
    </script>

</head>

<body>

<header>
    <h1>Product Landing Page</h1>
    <h3>Created by JOEL</h3>
</header>

<div class="container">

    <div class="card">

        <h2>Smart Watch</h2>

        <img src="https://via.placeholder.com/200">

        <p>Price: ₹999</p>

        <p>This is a demo product page created for Cloudflare assignment.</p>

        <button onclick="buyNow()">Buy Now</button>

    </div>

</div>

<footer>
    <p>© 2026 Website by JOEL</p>
</footer>

</body>
</html>
