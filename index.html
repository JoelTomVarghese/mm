<!DOCTYPE html>
<html>
<head>
    <title>Product Landing Page</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        header {
            background: #002b5c;
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px black;
        }

        header h1 {
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .card {
            background: white;
            padding: 20px;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 200px;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-size: 20px;
            font-weight: bold;
        }

        button {
            background: #ff6600;
            color: white;
            padding: 12px;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background: #cc5200;
        }

        footer {
            background: #002b5c;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

    </style>

    <script>
        function buyNow() {
            alert("Thank you! Purchase successful - JOEL");
        }
    </script>

</head>

<body>

<header>
    <h1>Product Landing Page</h1>
    <h3>Created by JOEL</h3>
</header>

<div class="container">

    <div class="card">

        <h2>Smart Watch</h2>

        <img src="https://furper.com/cdn/shop/files/redmi-watch-6-ultra-slim-design-207-amoled-display-support-nfc-powered-by-xiaomis-hyperos-3-up-to-24-day-battery-life-smartwatch-xiaomi-black-792626_large.jpg?v=1762505944">

        <p class="price">Price: ₹999</p>

        <p>Modern smart watch with stylish design and long battery life.</p>

        <button onclick="buyNow()">Buy Now</button>

    </div>

</div>

<footer>
    © 2026 Website by JOEL
</footer>

</body>
</html>
